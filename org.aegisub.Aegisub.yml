# Thanks To:
#   https://gitlab.archlinux.org/archlinux/packaging/packages/aegisub/-/blob/main/PKGBUILD
#   https://gitlab.archlinux.org/archlinux/packaging/packages/wxwidgets/-/blob/main/PKGBUILD
#   https://github.com/flathub/io.mpv.Mpv/blob/master/io.mpv.Mpv.yml
#   https://github.com/flathub/org.audacityteam.Audacity/blob/master/org.audacityteam.Audacity.yaml
#   https://github.com/flathub/org.blender.Blender/blob/master/org.blender.Blender.json
#   https://github.com/scx/aegisub-flatpak

id: org.aegisub.Aegisub
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: aegisub
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=home
add-extensions:
  org.aegisub.Aegisub.Automations:
    directory: automations
    subdirectories: true
    add-ld-path: lib
    merge-dirs: share/aegisub/automation/autoload;share/aegisub/automation/include;share/aegisub/automation/demo;share/aegisub/automation/lib
    no-autodownload: true
    autodelete: true
  org.aegisub.Aegisub.Automations.default:
    directory: automations/default
    bundle: true
    no-autodownload: false
    autodelete: true
  org.aegisub.Aegisub.Automations.DependencyControl:
    directory: automations/dependency_control
    bundle: true
    no-autodownload: true
    autodelete: true
# TODO: Consider separate locales
separate-locales: false
cleanup-commands:
  - install -d ${FLATPAK_DEST}/automations
  - ln -s ${FLATPAK_DEST}/automations/share/aegisub/automation ${FLATPAK_DEST}/share/aegisub/automation
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - /man
  - /share/man
  - /share/doc
  - /share/gtk-doc
  - "*.la"
  - "*.a"
modules:
  - name: aegisub
    buildsystem: meson
    config-opts:
      - -Db_lto=true
      # Audio output
      - -Dalsa=enabled
      - -Dlibpulse=enabled
      # Video source
      - -Dffms2=enabled
      - -Davisynth=enabled
      # Text
      - -Dhunspell=enabled
      - -Duchardet=enabled
      - -Dcsri=enabled
      # Other
      - -Dfftw3=enabled
      - -Dsystem_luajit=true
      - -Dwx_version=3.2.6
      - -Dcredit="zefr0x"
      - -Denable_update_checker=false
      - --buildtype=release
    post-install:
      - mkdir -p ${FLATPAK_DEST}/automations/default/share/aegisub
      - mv ${FLATPAK_DEST}/share/aegisub/automation ${FLATPAK_DEST}/automations/default/share/aegisub/automation
    sources:
      - type: git
        url: https://github.com/TypesettingTools/Aegisub
        tag: v3.4.2
        commit: f437ba4f547fdb0e02432f1c45a4da25e51035f8
        x-checker-data:
          type: git
          tag-pattern: ^v(\d*\.\d*\.\d*)$
          version-scheme: semantic
      - type: patch
        path: fix-and-improve-appstream-file.patch
    modules:
      - name: wxwidgets
        buildsystem: cmake-ninja
        config-opts:
          # TODO: Disable more unused features to fast up compiling.
          - -DCMAKE_BUILD_TYPE=Release
          - -DwxBUILD_TOOLKIT=gtk3
          - -DwxUSE_BASE64=OFF
          - -DwxUSE_GIF=OFF
          - -DwxUSE_LIBJPEG=OFF
          - -DwxUSE_SVG=OFF
          - -DwxUSE_TARSTREAM=OFF
          - -DwxUSE_LIBTIFF=OFF
          - -DwxUSE_WEBVIEW_WEBKIT=OFF
          - -DwxUSE_WEBVIEW=OFF
          - -DwxUSE_LIBPNG=sys
        cleanup:
          - /bin
          - /share/bakefile
          - /lib/wx
        sources:
          - type: git
            url: https://github.com/wxWidgets/wxWidgets.git
            tag: v3.2.8
            commit: 8aef5f40b93958719771331ca03866b7b6fff6bf
            x-checker-data:
              type: git
              tag-pattern: ^v(\d*\.\d*\.\d*)$
              version-scheme: semantic
      - name: ffms2
        buildsystem: autotools
        cleanup:
          - /bin
        sources:
          - type: git
            url: https://github.com/FFMS/ffms2.git
            tag: "5.0"
            commit: 7ed5e4d039ca9a6236bd2ebdfdd656c4304fbe04
            x-checker-data:
              type: git
              tag-pattern: ^(\d*\.\d*)$
        modules:
          - name: ffmpeg
            buildsystem: autotools
            config-opts:
              # Should be ok, since ffms2 binaries are GPL.
              - --enable-gpl
              # TODO: Consider using GPLv3.
              - --enable-version3
              - --enable-shared
              - --enable-lto
              # No CLI tool is used.
              - --disable-programs
              # No docs are needed in flatpak.
              - --disable-doc
              # Those components are not used in ffms2.
              - --disable-avdevice
              - --disable-avfilter
              - --disable-network
              # FFMS2 doens't do any encoding, hwaccel, muxing, filtering or use devices.
              - --disable-encoders
              - --disable-hwaccels
              - --disable-muxers
              - --disable-filters
              - --disable-devices
              # External library support:
              - --disable-alsa
              - --disable-iconv
              # TODO: Considor using `aom` over `dav1d`.
              # - --enable-libaom # AV1 video decoding via libaom
              - --enable-libdav1d # AV1 decoding via libdav1d
              - --enable-libjxl # JPEG XL decoding via libjxl
              - --enable-libopenjpeg # JPEG 2000 decoding via OpenJPEG
              - --enable-libvpx # VP8 and VP9 decoding via libvpx
              # Developer options:
              - --disable-debug
            cleanup:
              - /share/ffmpeg
            sources:
              - type: git
                url: https://github.com/FFmpeg/FFmpeg.git
                tag: n8.0
                commit: 140fd653aed8cad774f991ba083e2d01e86420c7
                x-checker-data:
                  type: git
                  tag-pattern: ^n([\d.]{3,7})$
      - name: boost
        buildsystem: simple
        build-commands:
          - ./bootstrap.sh --prefix=${FLATPAK_DEST} --with-libraries=chrono,container,filesystem,system,locale,regex,thread
            --with-icu
          - ./b2 install variant=release
        sources:
          - type: archive
            url: https://archives.boost.io/release/1.88.0/source/boost_1_88_0.tar.gz
            sha512: fa97666d3de550541b038b1a5b496284ab0785b9fff1c5da01e88605f04ce97541626cbd2f9b793bd5b87fccb2db10f5f7544f4d78c710f39f4b6455a910e654
            x-checker-data:
              type: anitya
              project-id: 6845
              stable-only: true
              url-template: https://archives.boost.io/release/$version/source/boost_${major}_${minor}_${patch}.tar.gz
      - name: LuaJIT
        buildsystem: simple
        build-commands:
          - make XCFLAGS="-DLUAJIT_ENABLE_LUA52COMPAT" PREFIX="${FLATPAK_DEST}" install
        cleanup:
          - /bin
        sources:
          - type: git
            url: https://github.com/LuaJIT/LuaJIT.git
            # LuaJIT has a "rolling release" where you should follow git HEAD
            # branch: v2.1
            commit: f73e649a954b599fc184726c376476e7a5c439ca
      - ./shared-modules/linux-audio/fftw3f.json
      - name: AviSynthPlus
        buildsystem: cmake-ninja
        config-opts:
          - -DENABLE_CUDA=ON
        sources:
          - type: git
            url: https://github.com/AviSynth/AviSynthPlus.git
            tag: v3.7.5
            commit: 6c7c26617a6675eec89e4d4a3565ed709df6511f
            x-checker-data:
              type: git
              version-scheme: semantic
      - name: libass
        buildsystem: autotools
        sources:
          - type: git
            url: https://github.com/libass/libass.git
            tag: 0.17.4
            commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
            x-checker-data:
              type: git
              version-scheme: semantic
      - name: uchardet
        buildsystem: cmake-ninja
        config-opts:
          - -DCMAKE_BUILD_TYPE=Release
          - -DBUILD_BINARY=OFF
        sources:
          - type: git
            url: https://gitlab.freedesktop.org/uchardet/uchardet.git
            tag: v0.0.8
            commit: ae6302a016088ad07177f86d417b20010053632b
            x-checker-data:
              type: git
              version-scheme: semantic
      - shared-modules/intltool/intltool-0.51.json
      - name: gtest
        buildsystem: cmake-ninja
        cleanup:
          - /**
        sources:
          - type: git
            url: https://github.com/google/googletest.git
            tag: v1.17.0
            commit: 52eb8108c5bdec04579160ae17225d66034bd723
            x-checker-data:
              type: git
              version-scheme: semantic
  - name: DependencyControl
    buildsystem: simple
    build-commands:
      - install macros/l0.DependencyControl.Toolbox.moon "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/autoload/"
      - install modules/DependencyControl.moon "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/l0/"
      - install -d "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/l0/DependencyControl/""
      - cp -p -r modules/DependencyControl/* "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/l0/DependencyControl/"
    sources:
      - type: git
        url: https://github.com/TypesettingTools/DependencyControl.git
        tag: v0.6.4-alpha
        commit: 92aae98dafc54117411efeb5f85e0d57dcb3daaf
        x-checker-data:
          type: git
          tag-pattern: ^v(\d*\.\d*\.\d*)(-alpha)?$
          version-scheme: semantic
    modules:
      - name: YUtils
        buildsystem: simple
        build-commands:
          - install -D src/Yutils.lua "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/Yutils.lua"
        sources:
          - type: git
            url: https://github.com/TypesettingTools/YUtils
            commit: 91a4ac771b08ecffdcc8c084592286961d99c5f2
      - name: LuaJSON
        buildsystem: simple
        # note: upstream has a makefile, but that just installs the files, but into the wrong directory, and it's not modifiable, as it appends a lua_bins dir
        build-commands:
          - mkdir -p "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/"
          - cp -p -r lua/* "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/"
        sources:
          - type: git
            url: https://github.com/harningt/luajson.git
            commit: 6ecaf9bea8b121a9ffca5a470a2080298557b55d
      - name: luarocks
        buildsystem: simple
        build-commands:
          - ./configure --with-lua="${FLATPAK_DEST}" --lua-version="5.1" --prefix="${FLATPAK_DEST}" --with-lua-interpreter=luajit
          - make install
        sources:
          - type: git
            url: https://github.com/luarocks/luarocks
            tag: v3.12.2
            commit: 990ec6ca3b097c7160fe925cfca4b8e57cfe5685
      - name: luarocks-alt-getopt_rock
        buildsystem: simple
        build-commands:
          - luarocks build ./alt-getopt-0.8.0-1.src.rock
        sources:
          - type: file
            url: https://luarocks.org/manifests/mpeterv/alt-getopt-0.8.0-1.src.rock
            sha512: 501168c6a53094b0d49805ae69bd59722c75155c41d5d71d9a8ad93120fcb8a516b67909702331df838216f817e20c941e26a76de7c643743525e71e9e2dc0b2
      - name: luarocks-luafilesystem
        buildsystem: simple
        build-commands:
          - luarocks build
        sources:
          - type: git
            url: https://github.com/lunarmodules/luafilesystem
            commit: 09511782201302ade916d4b250d01a6c61b56844
      - name: luarocks-lpeg_rock
        buildsystem: simple
        build-commands:
          - luarocks build ./lpeg-1.1.0-2.src.rock
        sources:
          - type: file
            url: https://luarocks.org/manifests/gvvaughan/lpeg-1.1.0-2.src.rock
            sha512: e2c9dd2c8bdbb14dcedead7708dcc98c95e5c6a5f90ca0768886dfa16e97936283e6b433ffced1ef3f67f6e8f36a41615153dd570d1089e6b8fc446a59bb2fb1
      - name: moonscript
        buildsystem: simple
        build-commands:
          - make LUA=luajit LUAROCKS=luarocks compile
          - mkdir -p "${FLATPAK_DEST}/bin/"
          - install bin/moon bin/moonc "${FLATPAK_DEST}/bin/"
        # TODO: we need moonscript for .moon files from dependency controls files, but do we really need bin/moon and bin/moonc or does it use some lua files, that are installed somewhere like share/lua/5.1 or similiar
        cleanup:
          # remove lua and luarocks
          # TODO: do correctly
          - /bin/lua
        sources:
          - type: git
            url: https://github.com/leafo/moonscript
            tag: v0.5.0
            commit: c3f4e511c21afa7d2f9b6257f9d3805da65b0313
          - type: patch
            path: moonscript-use-luajit.patch
      - name: ffi-experiments
        buildsystem: simple
        build-commands:
          - command -v moonc &>/dev/null || (echo "moonc not found" >&2 && exit 1)
          - moonc --version
          - moonc --version &> /dev/null || (echo "moonc defect" >&2 && exit 1)
          - make lua
          - make all
          - install -D build/requireffi.lua "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/requireffi/requireffi.lua"
          - install -D build/BadMutex.lua "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/BM/BadMutex.lua"
          - install -D build/DownloadManager.lua "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/DM/DownloadManager.lua"
          - install -D build/PreciseTimer.lua "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/include/PT/PreciseTimer.lua"
          - mkdir -p "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/lib/"
          - install build/libBadMutex.so build/libDownloadManager.so build/libPreciseTimer.so "${FLATPAK_DEST}/automations/dependency_control/share/aegisub/automation/lib/"
        sources:
          - type: git
            url: https://github.com/TypesettingTools/ffi-experiments
            commit: 3d31f77b752a95c1e4186582dcaf39a21301c5a9
